spring.application.name=uniquehire-ems
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/uniquehire_ems
spring.datasource.username=ems_user
spring.datasource.password=ems_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.consumer.group-id=ems-notification-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.uniquehire.ems.kafka

# Kafka Topics
app.kafka.topics.attendance-marked=ems.attendance.marked
app.kafka.topics.leave-requested=ems.leave.requested
app.kafka.topics.leave-approved=ems.leave.approved
app.kafka.topics.leave-rejected=ems.leave.rejected
app.kafka.topics.payroll-processed=ems.payroll.processed
app.kafka.topics.employee-onboarded=ems.employee.onboarded

# JWT
app.jwt.secret=UniqueHireEMSSecretKey2024VeryLongSecretKeyForHS256AlgorithmMinimum32Chars
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# QR Token
app.qr.token-ttl-seconds=30
app.qr.company-wifi-ssids=Corp-WiFi-5G,UniqueHire-Office,UH-Internal

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/profiles

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Logging
logging.level.com.uniquehire=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.kafka=WARN
